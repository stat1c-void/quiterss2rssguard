version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      uv-development:
        dependency-type: development
